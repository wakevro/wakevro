<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VRO | CONTACT</title>
    <link href="./images/vro.png" rel="icon">
    <link rel="stylesheet" href="https://pro.fontawesome.com/releases/v5.10.0/css/all.css">
    <link rel="stylesheet" type="text/css" href="./css/style.css">
    <link rel="stylesheet" type="text/css" href="./css/contact.css">
    
</head>

<body>
    <nav>
        <input type="checkbox" id="check">
        <label for="check" class="checkbtn">
            <i class="fas fa-bars"></i>
        </label>
        <div class="logo">
            <a class="logo" href="./index.html"><img src="./images/vro.png" alt="VRO"></a>
        </div>
        <ul class="navlinks">
            <li><a href="./index.html">Home</a></li>
            <li><a href="./about.html">About</a></li>
            <li><a href="./work.html">Work</a></li>
            <li><a class="currentlink" href="./contact.html">Contact</a></li>
        </ul>
    </nav>

    <div class="universal">

        <div class="main">
            <h2 class="subhead">Let's talk.</h2>
            <h3 class="regulartext">Get in touch via the form below or by emailing <a class="contactlink" href="mailto:contact@wakevro.com">contact@wakevro.com</a></h3>
        </div>

        <div class="contactblock">
            <form class="contact" name="contactform">
                <div class="formcontrol">
                    <input type="text" class="inputfield" name="name" placeholder="Enter your name">
                    <div class="error hide">Name is required.</div>
                </div>

                <div class="formcontrol">
                    <input type="text" class="inputfield" name="email" placeholder="Enter your email address">
                    <div class="error hide">Email is invalid.</div>                    
                </div>

                <div class="formcontrol">
                    <textarea name="message" class="messagefield" placeholder="Enter your message"></textarea>
                    <div class="error hide">Message is required.</div>
                </div>

                <div class="submit"><button class="submitbutton" type="submit" name="submit">SUBMIT</button></div>
            </form>
        </div>

    </div>

    <footer>
        <ul class="social">
            <li><a href="https://www.linkedin.com/in/richardabhulimhen/" target="blank"><img src="./images/linkedin.png" alt="Linkedin"></a></li>
            <li><a href="https://www.facebook.com/wakevro" target="blank"><img src="./images/facebook.png" alt="Facebook"></a></li>
            <li><a href="https://www.instagram.com/wakevro/" target="blank"><img src="./images/instagram.png" alt="Instagram"></a></li>
            <li><a href="https://twitter.com/wakevro" target="blank"><img src="./images/twitter.png" alt="Twitter"></a></li>
            <li><a href="https://www.behance.net/wakevro" target="blank"><img src="./images/behance.png" alt="Behance"></a></li>
        </ul>
    </footer>
    
    <script src=".//javascript/script.js"></script>

</body>

</html>
